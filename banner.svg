<svg fill="none" viewBox="0 0 1000 350" width="100%" height="350" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Open+Sans:wght@600;700&display=swap');
        
        .main-container {
          background-color: #141e30;
          width: 1000px;
          height: 350px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Open Sans', sans-serif;
          border-radius: 20px;
          box-sizing: border-box;
          padding: 20px;
        }
        
        .content-box {
          background-color: #35577d;
          width: 900px;
          height: 250px;
          border-radius: 50px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 50px;
          box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .text-group {
          flex: 1;
        }
        
        .name-line {
          font-family: 'Montserrat', sans-serif;
          font-size: 50px;
          font-weight: 800;
          color: #c1e8ff;
          letter-spacing: -1px;
          margin-bottom: 8px;
        }
        
        .college-details {
          font-size: 16px;
          color: #ffffff;
          opacity: 0.85;
          font-weight: 600;
          line-height: 1.6;
        }
        
        .major-info {
          font-size: 14px;
          color: #e67e22;
          text-transform: uppercase;
          letter-spacing: 2px;
          font-weight: 700;
          margin-top: 5px;
        }
        
        .photo-container {
          position: relative;
          width: 180px;
          height: 180px;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        
        .photo-background {
          fill: #c1e8ff;
          width: 100%;
          height: 100%;
          rx: 40px;
          ry: 40px;
        }

        .decorative-sparkle {
          font-size: 30px;
          color: rgba(193, 232, 255, 0.3);
        }
      </style>
      <div class="main-container">
        <svg class="content-box" viewBox="0 0 900 250">
          
          <rect x="0" y="0" width="900" height="250" rx="50" ry="50" fill="#35577d" />
          
          <foreignObject x="50" y="60" width="600" height="150">
            <div class="name-line">SOUMOJIT PAUL</div>
            <div class="college-details">GURUDAS COLLEGE @ CALCUTTA UNIVERSITY</div>
            <div class="major-info">PHYSICS HONOURS</div>
          </foreignObject>
          
          <rect x="670" y="35" width="180" height="180" rx="40" ry="40" fill="#c1e8ff" />
          
          <clipPath id="clipPhoto">
            <rect x="670" y="35" width="180" height="180" rx="40" ry="40" />
          </clipPath>
          
          <image href="YOUR_PHOTO_URL_HERE" 
                 x="670" y="35" width="180" height="180" 
                 preserveAspectRatio="xMidYMid slice" 
                 clip-path="url(#clipPhoto)" />
                 
          <foreignObject x="850" y="200" width="40" height="40">
            <div class="decorative-sparkle">✦</div>
          </foreignObject>
        </svg>
      </div>
    </div>
  </foreignObject>
</svg>
